{% if google_auth_enabled %}
<div class="social-divider">
    <span>Or continue with</span>
</div>

<div class="google-auth-wrap">
    <div id="google-auth-button"></div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) {
            return parts.pop().split(';').shift();
        }
        return '';
    }

    async function handleGoogleCredential(response) {
        const csrfToken = getCookie('csrftoken');

        const authResponse = await fetch("{% url 'safarisite:google_auth' %}", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken,
            },
            body: JSON.stringify({
                credential: response.credential,
                next_url: "{{ next_url|escapejs }}",
            }),
        });

        const payload = await authResponse.json();
        if (payload.ok) {
            window.location.href = payload.redirect_url;
            return;
        }

        const errorBox = document.getElementById('google-auth-error');
        if (errorBox) {
            errorBox.textContent = payload.error || 'Google sign-in failed.';
        }
    }

    window.addEventListener("load", function () {
        if (!window.google || !window.google.accounts || !window.google.accounts.id) {
            return;
        }

        window.google.accounts.id.initialize({
            client_id: "{{ google_auth_client_id|escapejs }}",
            callback: handleGoogleCredential,
            auto_select: false,
        });

        window.google.accounts.id.renderButton(
            document.getElementById("google-auth-button"),
            {
                theme: "outline",
                size: "large",
                shape: "pill",
                text: "continue_with",
                width: 320
            }
        );
    });
</script>
{% endif %}
